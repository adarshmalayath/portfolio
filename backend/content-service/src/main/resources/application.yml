server:
  port: ${CONTENT_SERVICE_PORT:8082}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DB_USER:portfolio_user}
    password: ${DB_PASSWORD:portfolio_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
